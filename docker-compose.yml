services:
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: medianet
      POSTGRES_PASSWORD: medianet2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medianet -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-candidature:
    image: postgres:15
    container_name: postgres-candidature
    environment:
      POSTGRES_DB: candidature_db
      POSTGRES_USER: medianet
      POSTGRES_PASSWORD: medianet2024
    ports:
      - "5434:5432"
    volumes:
      - postgres_candidature_data:/var/lib/postgresql/data
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medianet -d candidature_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:15
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: medianet
      POSTGRES_PASSWORD: medianet2024
    ports:
      - "5435:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medianet -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-programme:
    image: postgres:15
    container_name: postgres-programme
    environment:
      POSTGRES_DB: programme_db
      POSTGRES_USER: medianet
      POSTGRES_PASSWORD: medianet2024
    ports:
      - "5436:5432"
    volumes:
      - postgres_programme_data:/var/lib/postgresql/data
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medianet -d programme_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-admin-ai:
    image: postgres:15
    container_name: postgres-admin-ai
    environment:
      POSTGRES_DB: admin_ai_db
      POSTGRES_USER: medianet
      POSTGRES_PASSWORD: medianet2024
    ports:
      - "5437:5432"
    volumes:
      - postgres_admin_ai_data:/var/lib/postgresql/data
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medianet -d admin_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO: S3-compatible object storage for photos, logos, attachments ──
  minio:
    image: minio/minio:latest
    container_name: medianet-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: medianet
      MINIO_ROOT_PASSWORD: medianet2024
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Run once on startup: create the bucket + set public-read policy on it
  minio-setup:
    image: minio/mc:latest
    container_name: medianet-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        until (mc alias set local http://minio:9000 medianet medianet2024) do echo 'waiting for minio…'; sleep 2; done;
        mc mb -p local/medianet || true;
        mc anonymous set download local/medianet || true;
        echo '✓ MinIO bucket medianet ready (public read)';
        exit 0;
      "
    networks:
      - medianet-network
    restart: "no"

  # Self-hosted pitch video analysis: ffmpeg + faster-whisper (transcription)
  # + Ollama vision (frame captioning). Called by admin-ai-service.
  pitch-media-service:
    build: ./backend/pitch-media-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-pitch-media-service:${TAG:-latest}
    container_name: pitch-media-service
    ports:
      - "8089:8087"
    environment:
      MINIO_PUBLIC_URL:   http://localhost:9000
      MINIO_INTERNAL_URL: http://minio:9000
      OLLAMA_URL:         http://ollama:11434
      WHISPER_MODEL:      ${WHISPER_MODEL:-base}
      WHISPER_DEVICE:     cpu
      WHISPER_COMPUTE:    int8
      # Set to a pulled Ollama vision model (e.g. "moondream" or "llava") to
      # enable body-language/visual analysis. Empty = transcription only.
      VISION_MODEL:       ${PITCH_VISION_MODEL:-moondream}
      # 3 frames + greedy decoding keep the analysis fast (see WHISPER_BEAM).
      FRAME_COUNT:        "3"
      WHISPER_BEAM:       "1"
    volumes:
      - whisper_models:/models
    networks:
      - medianet-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Single parallel slot per loaded model → KV cache memory ÷ 4 (default 4).
      # The admin AI is single-user single-turn, so we don't need parallelism.
      # Frees ~600 MiB VRAM → lets the full 7B-q3 model fit entirely on GPU.
      OLLAMA_NUM_PARALLEL: "1"
      # Only keep one model in VRAM at a time (default is also 1 but be explicit).
      OLLAMA_MAX_LOADED_MODELS: "1"
    networks:
      - medianet-network
    # GPU passthrough — requires NVIDIA Container Toolkit on the host.
    # If unavailable (CPU-only host), comment the deploy block out.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Auto-pull llama3.2 on first start (skipped on subsequent starts
    # because the model is already in the ollama_data volume).
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        OLLAMA_PID=$$!;
        echo 'Waiting for Ollama to be ready...';
        until ollama list > /dev/null 2>&1; do sleep 2; done;
        echo 'Pulling llama3.2 (skipped if already present)...';
        ollama pull llama3.2;
        echo 'Ollama ready.';
        wait $$OLLAMA_PID
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.2"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medianet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: medianet
      RABBITMQ_DEFAULT_PASS: medianet2024
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - medianet-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  eureka-server:
    build: ./backend/eureka-server
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-eureka-server:${TAG:-latest}
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - medianet-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    build: ./backend/auth-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-auth-service:${TAG:-latest}
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: medianet
      SPRING_DATASOURCE_PASSWORD: medianet2024
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: medianet
      SPRING_RABBITMQ_PASSWORD: medianet2024
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - medianet-network

  candidature-service:
    build: ./backend/candidature-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-candidature-service:${TAG:-latest}
    container_name: candidature-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-candidature:5432/candidature_db
      SPRING_DATASOURCE_USERNAME: medianet
      SPRING_DATASOURCE_PASSWORD: medianet2024
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: medianet
      SPRING_RABBITMQ_PASSWORD: medianet2024
      AUTH_SERVICE_URL: http://auth-service:8081
      PROGRAMME_SERVICE_URL: http://programme-service:8086
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-candidature:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - medianet-network

  notification-service:
    build: ./backend/notification-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-notification-service:${TAG:-latest}
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      SPRING_DATASOURCE_USERNAME: medianet
      SPRING_DATASOURCE_PASSWORD: medianet2024
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      MAIL_HOST: smtp-relay.brevo.com
      MAIL_PORT: 587
      MAIL_USERNAME: yassinecherni9@gmail.com
      MAIL_PASSWORD: xsmtpsib-6d75f3a0b99bd3d46f424229b923edb06985736497f2321976b31bead9554701-afO3b8sYFI3WbyXp
      MAIL_FROM: yassinecherni9@gmail.com
      MAIL_FROM_NAME: Medianet Incubateur
      FRONTEND_URL: http://localhost:4200
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-notification:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - medianet-network

  programme-service:
    build: ./backend/programme-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-programme-service:${TAG:-latest}
    container_name: programme-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-programme:5432/programme_db
      SPRING_DATASOURCE_USERNAME: medianet
      SPRING_DATASOURCE_PASSWORD: medianet2024
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      EUREKA_URI: http://eureka-server:8761/eureka
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      # MinIO / file storage
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: medianet
      MINIO_SECRET_KEY: medianet2024
      MINIO_BUCKET: medianet
      # Multipart upload limits
      # Pitch videos can be large — these env vars OVERRIDE application.yml.
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 2GB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 2GB
      # Canva Connect (optional — set in the root .env; empty = feature off)
      CANVA_CLIENT_ID: ${CANVA_CLIENT_ID:-}
      CANVA_CLIENT_SECRET: ${CANVA_CLIENT_SECRET:-}
      # Canva's portal refuses « localhost » in redirect URLs — 127.0.0.1 only.
      CANVA_REDIRECT_URI: ${CANVA_REDIRECT_URI:-http://127.0.0.1:8080/api/canva/callback}
      # Don't cap the swallowed body when a request is rejected (avoids resets).
      SERVER_TOMCAT_MAX_SWALLOW_SIZE: "-1"
    depends_on:
      postgres-programme:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - medianet-network

  ai-scoring-service:
    build: ./backend/ai-scoring-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-ai-scoring-service:${TAG:-latest}
    container_name: ai-scoring-service
    ports:
      - "8084:8084"
    environment:
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      CANDIDATURE_SERVICE_URL: http://candidature-service:8083
      PROGRAMME_SERVICE_URL: http://programme-service:8086
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      ollama:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      candidature-service:
        condition: service_started
      programme-service:
        condition: service_started
    networks:
      - medianet-network

  ai-matching-service:
    build: ./backend/ai-matching-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-ai-matching-service:${TAG:-latest}
    container_name: ai-matching-service
    ports:
      - "8085:8085"
    environment:
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      CANDIDATURE_SERVICE_URL: http://candidature-service:8083
      AUTH_SERVICE_URL: http://auth-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      ollama:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      candidature-service:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - medianet-network

  admin-ai-service:
    build: ./backend/admin-ai-service
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-admin-ai-service:${TAG:-latest}
    container_name: admin-ai-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-admin-ai:5432/admin_ai_db
      SPRING_DATASOURCE_USERNAME: medianet
      SPRING_DATASOURCE_PASSWORD: medianet2024
      JWT_SECRET: medianet-super-secret-jwt-key-2024-medianet-incubation
      EUREKA_URI: http://eureka-server:8761/eureka
      # LLM backend — defaults to HuggingFace Inference Providers.
      # Admin can configure the API key + model from the backoffice UI; these env
      # vars are optional fallbacks (DB row takes precedence).
      HF_TOKEN:     ${HF_TOKEN:-}
      LLM_MODEL:    ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_APP_NAME: "Medianet Incubateur"
      # Internal service URLs
      PROGRAMME_SERVICE_URL:    http://programme-service:8086
      AUTH_SERVICE_URL:         http://auth-service:8081
      CANDIDATURE_SERVICE_URL:  http://candidature-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      # Self-hosted pitch media pipeline (transcription + visual analysis)
      PITCH_MEDIA_SERVICE_URL:  http://pitch-media-service:8087
    depends_on:
      postgres-admin-ai:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - medianet-network

  api-gateway:
    build: ./backend/api-gateway
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-api-gateway:${TAG:-latest}
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      AI_MATCHING_SERVICE_URL: http://ai-matching-service:8085
      AI_SCORING_SERVICE_URL: http://ai-scoring-service:8084
    depends_on:
      eureka-server:
        condition: service_healthy
      ai-matching-service:
        condition: service_started
      ai-scoring-service:
        condition: service_started
    networks:
      - medianet-network

  nextjs-frontoffice:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-frontoffice:${TAG:-latest}
    build:
      context: ./frontend/nextjs-frontoffice
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8080}
    container_name: nextjs-frontoffice
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8080}
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - medianet-network

  nextjs-backoffice:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-backoffice:${TAG:-latest}
    build:
      context: ./frontend/nextjs-backoffice
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8080}
    container_name: nextjs-backoffice
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8080}
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - medianet-network

  # Reverse proxy — only used in production (docker-compose.prod.yml). Behind the
  # "proxy" profile so `docker compose up` in dev doesn't start it; it is still
  # built & pushed via `docker compose --profile proxy build|push`.
  nginx:
    profiles: ["proxy"]
    build: ./nginx
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-nginx:${TAG:-latest}
    container_name: nginx
    networks:
      - medianet-network

networks:
  medianet-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_candidature_data:
  postgres_notification_data:
  postgres_programme_data:
  postgres_admin_ai_data:
  ollama_data:
  minio_data:
  whisper_models:
