server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: auth-service-organizations
          uri: lb://auth-service
          predicates:
            - Path=/api/organizations/**
        - id: candidature-service
          uri: lb://candidature-service
          predicates:
            - Path=/api/candidatures/**
        - id: programme-service
          uri: lb://programme-service
          predicates:
            - Path=/api/programmes/**
        - id: programme-service-partners
          uri: lb://programme-service
          predicates:
            - Path=/api/partners/**
        - id: programme-service-tasks
          uri: lb://programme-service
          predicates:
            - Path=/api/tasks/**
        - id: programme-service-files
          uri: lb://programme-service
          predicates:
            - Path=/api/files/**
        - id: programme-service-landing
          uri: lb://programme-service
          predicates:
            - Path=/api/landing-page/**
        - id: programme-service-presets
          uri: lb://programme-service
          predicates:
            - Path=/api/session-presets/**
        - id: programme-service-form-templates
          uri: lb://programme-service
          predicates:
            - Path=/api/form-templates/**
        - id: programme-service-parcours-templates
          uri: lb://programme-service
          predicates:
            - Path=/api/parcours-templates/**
        - id: admin-ai-service
          uri: lb://admin-ai-service
          predicates:
            - Path=/api/admin-ai/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: ai-scoring-service
          uri: ${AI_SCORING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/ai/score/**
        - id: ai-matching-service
          uri: ${AI_MATCHING_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/ai/match/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:[*]"
              - "http://127.0.0.1:[*]"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
