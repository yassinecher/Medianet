server:
  port: 8084

spring:
  application:
    name: ai-scoring-service

jwt:
  secret: ${JWT_SECRET:medianet-super-secret-jwt-key-2024-medianet-incubation}

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}

candidature:
  service:
    url: ${CANDIDATURE_SERVICE_URL:http://localhost:8083}

programme:
  service:
    url: ${PROGRAMME_SERVICE_URL:http://localhost:8086}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.medianet: DEBUG
