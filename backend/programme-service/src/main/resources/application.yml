server:
  port: 8086
  tomcat:
    # Don't cap the body Tomcat swallows when rejecting a request (avoids
    # connection resets on oversized uploads).
    max-swallow-size: -1

spring:
  application:
    name: programme-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/programme_db}
    username: ${SPRING_DATASOURCE_USERNAME:medianet}
    password: ${SPRING_DATASOURCE_PASSWORD:medianet2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      # Pitch videos can be large — raise the default 1MB/10MB limits.
      # NB: docker-compose sets SPRING_SERVLET_MULTIPART_* env vars which
      # OVERRIDE these values — keep both in sync.
      max-file-size: 2GB
      max-request-size: 2GB
jwt:
  secret: ${JWT_SECRET:medianet-super-secret-jwt-key-2024-medianet-incubation}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.medianet: DEBUG
