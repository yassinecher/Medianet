server:
  port: 8082

spring:
  application:
    name: session-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/session_db}
    username: ${SPRING_DATASOURCE_USERNAME:medianet}
    password: ${SPRING_DATASOURCE_PASSWORD:medianet2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:medianet}
    password: ${SPRING_RABBITMQ_PASSWORD:medianet2024}

jwt:
  secret: ${JWT_SECRET:medianet-super-secret-jwt-key-2024-medianet-incubation}
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.medianet: DEBUG
