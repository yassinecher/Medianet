name: Build & Deploy

# Builds the Medianet images natively for arm64 (no QEMU emulation), pushes them
# to Docker Hub, then pulls & restarts the stack on the server over SSH.
#
# Nothing secret lives in this file — every credential is read from GitHub
# "Secrets" you set yourself (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub user (yassinecherni9)
#   DOCKERHUB_TOKEN      a Docker Hub *access token* (NOT your password)
#   SSH_PRIVATE_KEY      the deploy key's PRIVATE half (a dedicated deploy key)
#   SERVER_HOST          server IP / hostname
#   SERVER_USER          SSH username on the server
# Optional repo "Variables" (with sensible defaults):
#   SERVER_SSH_PORT (22) · SERVER_PATH (~/medianet)
#   FRONTOFFICE_API_URL · BACKOFFICE_API_URL

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    # Native arm64 runner — no emulation. Free on PUBLIC repos; on private repos
    # it needs a paid plan. If unavailable, use a self-hosted runner on the
    # server instead:  runs-on: [self-hosted, linux, ARM64]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (native linux/arm64)
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: latest
          PLATFORMS: linux/arm64
          FRONTOFFICE_API_URL: ${{ vars.FRONTOFFICE_API_URL || 'https://app.medianet.dz' }}
          BACKOFFICE_API_URL: ${{ vars.BACKOFFICE_API_URL || 'https://admin.medianet.dz' }}
        run: docker buildx bake -f docker-bake.hcl --push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          # Store the BASE64 of the OpenSSH private key (copy-paste-proof).
          SSH_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if ! ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY must be the BASE64 of an OpenSSH private key — see DEPLOY.md."
            exit 1
          fi

      - name: Deploy on the server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ vars.SERVER_SSH_PORT || '22' }}
          DEST: ${{ vars.SERVER_PATH || '~/medianet' }}
        run: |
          SSHOPTS="-i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=accept-new"
          ssh $SSHOPTS "$USER@$HOST" "mkdir -p $DEST"
          scp -i "$HOME/.ssh/id_deploy" -P "$PORT" -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml "$USER@$HOST:$DEST/docker-compose.prod.yml"
          # Pull ONE image at a time (keeps the disk peak low on small servers),
          # then start the stack. $DEST expands here; \$svc runs on the server.
          ssh $SSHOPTS "$USER@$HOST" "cd $DEST && for svc in \$(docker compose -f docker-compose.prod.yml config --services); do echo \"==> pulling \$svc\"; docker compose -f docker-compose.prod.yml pull \$svc; done && docker compose -f docker-compose.prod.yml up -d --remove-orphans && docker image prune -f"
