name: CI — Build & Type-check

# Fast, infra-free sanity check on every push / PR: compile each Java service and
# type-check + build both frontends. (The heavy multi-arch build + deploy lives in
# deploy.yml.) Runs on amd64 ubuntu-latest, so it works on any repo/plan.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ─── Java microservices — compile + package (tests need infra → skipped here) ─
  build-java:
    name: Build Java Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - candidature-service
          - notification-service
          - programme-service
          - ai-scoring-service
          - ai-matching-service
          - admin-ai-service
          - api-gateway
          - eureka-server
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Compile & package ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn -B clean package -DskipTests --no-transfer-progress

  # ─── Next.js frontoffice ──────────────────────────────────────────────────
  build-frontoffice:
    name: Build Next.js Frontoffice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nextjs-frontoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/nextjs-frontoffice/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─── Next.js backoffice ───────────────────────────────────────────────────
  build-backoffice:
    name: Build Next.js Backoffice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nextjs-backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/nextjs-backoffice/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [build-java, build-frontoffice, build-backoffice]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.build-java.result }}" == "failure" || \
                "${{ needs.build-frontoffice.result }}" == "failure" || \
                "${{ needs.build-backoffice.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"; exit 1
          fi
          echo "All CI checks passed ✅"
