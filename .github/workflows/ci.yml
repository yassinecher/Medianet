name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ─── Java microservices ────────────────────────────────────────────────────
  build-java:
    name: Build & Test Java Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - session-service
          - candidature-service
          - notification-service
          - programme-service
          - ai-scoring-service
          - ai-matching-service
          - api-gateway
          - eureka-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & test ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn -B clean verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/*.xml
          retention-days: 7

  # ─── Next.js frontoffice ──────────────────────────────────────────────────
  build-frontoffice:
    name: Build Next.js Frontoffice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nextjs-frontoffice

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/nextjs-frontoffice/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─── Next.js backoffice ───────────────────────────────────────────────────
  build-backoffice:
    name: Build Next.js Backoffice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nextjs-backoffice

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/nextjs-backoffice/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─── Summary gate ─────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [build-java, build-frontoffice, build-backoffice]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.build-java.result }}" == "failure" || \
                "${{ needs.build-frontoffice.result }}" == "failure" || \
                "${{ needs.build-backoffice.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed ✅"
