name: CD — Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ─── Determine tag ────────────────────────────────────────────────────────
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Compute tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Building with tag: $TAG (sha: $SHORT_SHA)"

  # ─── Java microservices ───────────────────────────────────────────────────
  docker-java:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - session-service
          - candidature-service
          - notification-service
          - programme-service
          - ai-scoring-service
          - ai-matching-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests for CD speed)
        working-directory: backend/${{ matrix.service }}
        run: mvn -B clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/medianet-${{ matrix.service }}:${{ needs.prepare.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/medianet-${{ matrix.service }}:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── Next.js frontoffice ──────────────────────────────────────────────────
  docker-frontoffice:
    name: Docker — nextjs-frontoffice
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push frontoffice
        uses: docker/build-push-action@v5
        with:
          context: frontend/nextjs-frontoffice
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://api-gateway:8080
          tags: |
            ${{ env.DOCKER_USERNAME }}/medianet-frontoffice:${{ needs.prepare.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/medianet-frontoffice:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=gha,scope=frontoffice
          cache-to: type=gha,mode=max,scope=frontoffice

  # ─── Next.js backoffice ───────────────────────────────────────────────────
  docker-backoffice:
    name: Docker — nextjs-backoffice
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backoffice
        uses: docker/build-push-action@v5
        with:
          context: frontend/nextjs-backoffice
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://api-gateway:8080
          tags: |
            ${{ env.DOCKER_USERNAME }}/medianet-backoffice:${{ needs.prepare.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/medianet-backoffice:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice

  # ─── Nginx reverse proxy ──────────────────────────────────────────────────
  docker-nginx:
    name: Docker — nginx
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: nginx
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/medianet-nginx:${{ needs.prepare.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/medianet-nginx:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  # ─── Deploy (SSH to VPS) ──────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [docker-java, docker-frontoffice, docker-backoffice, docker-nginx]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.prod"
          target: "/opt/medianet"

      - name: Pull & restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/medianet
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export TAG=${{ needs.prepare.outputs.tag }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deployed tag $TAG ✅"
