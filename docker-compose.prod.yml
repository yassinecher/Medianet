# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION compose — pulls the images you pushed to Docker Hub and runs them.
# Self-contained: copy THIS file + a `.env` to your server, then:
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Image names must match what you build/push locally (see docker-compose.yml):
#   ${DOCKER_USERNAME}/medianet-<service>:${TAG}
#
# NOTE (frontends): NEXT_PUBLIC_API_URL is baked at BUILD time, not runtime.
# Build the frontend images with the PUBLIC api URL before pushing — see README.
# ─────────────────────────────────────────────────────────────────────────────

x-pull: &pull
  pull_policy: always
  restart: unless-stopped

services:
  # ── Reverse proxy — OPTIONAL. Only needed once you have a domain + TLS certs.
  # Enable it with:  docker compose -f docker-compose.prod.yml --profile proxy up -d
  # Without it, the frontends/gateway are reached directly by IP:port (below).
  nginx:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-nginx:${TAG:-latest}
    <<: *pull
    container_name: nginx
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certs from the host (Let's Encrypt). Adjust the domain if needed.
      - ${TLS_FULLCHAIN:-/etc/letsencrypt/live/medianet.dz/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_PRIVKEY:-/etc/letsencrypt/live/medianet.dz/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - nextjs-frontoffice
      - nextjs-backoffice
      - api-gateway
    networks: [medianet-network]

  # ── Frontends ──────────────────────────────────────────────────────────────
  nextjs-frontoffice:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-frontoffice:${TAG:-latest}
    <<: *pull
    container_name: nextjs-frontoffice
    ports:
      - "3000:3000"          # front office → http://SERVER_IP:3000
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTOFFICE_API_URL:-https://app.medianet.dz}
      NODE_ENV: production
    depends_on: [api-gateway]
    networks: [medianet-network]

  nextjs-backoffice:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-backoffice:${TAG:-latest}
    <<: *pull
    container_name: nextjs-backoffice
    ports:
      - "3001:3000"          # back office → http://SERVER_IP:3001
    environment:
      NEXT_PUBLIC_API_URL: ${BACKOFFICE_API_URL:-https://admin.medianet.dz}
      NODE_ENV: production
    depends_on: [api-gateway]
    networks: [medianet-network]

  # ── API gateway + service discovery ────────────────────────────────────────
  api-gateway:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-api-gateway:${TAG:-latest}
    <<: *pull
    container_name: api-gateway
    ports:
      - "8080:8080"          # API → http://SERVER_IP:8080  (frontends call this)
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      AI_MATCHING_SERVICE_URL: http://ai-matching-service:8085
      AI_SCORING_SERVICE_URL: http://ai-scoring-service:8084
    depends_on: [eureka-server]
    networks: [medianet-network]

  eureka-server:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-eureka-server:${TAG:-latest}
    <<: *pull
    container_name: eureka-server
    expose: ["8761"]
    networks: [medianet-network]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Business microservices ─────────────────────────────────────────────────
  auth-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-auth-service:${TAG:-latest}
    <<: *pull
    container_name: auth-service
    expose: ["8081"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB:-auth_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-medianet}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-medianet}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-medianet2024}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-auth: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  candidature-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-candidature-service:${TAG:-latest}
    <<: *pull
    container_name: candidature-service
    expose: ["8083"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-candidature:5432/${POSTGRES_CANDIDATURE_DB:-candidature_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-medianet}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-medianet}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-medianet2024}
      AUTH_SERVICE_URL: http://auth-service:8081
      PROGRAMME_SERVICE_URL: http://programme-service:8086
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-candidature: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  notification-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-notification-service:${TAG:-latest}
    <<: *pull
    container_name: notification-service
    expose: ["8087"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/${POSTGRES_NOTIFICATION_DB:-notification_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-medianet}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-smtp-relay.brevo.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Medianet Incubateur}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.medianet.dz}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres-notification: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  programme-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-programme-service:${TAG:-latest}
    <<: *pull
    container_name: programme-service
    expose: ["8086"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-programme:5432/${POSTGRES_PROGRAMME_DB:-programme_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-medianet}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URI: http://eureka-server:8761/eureka
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://app.medianet.dz}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-medianet}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-medianet2024}
      MINIO_BUCKET: ${MINIO_BUCKET:-medianet}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 2GB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 2GB
      SERVER_TOMCAT_MAX_SWALLOW_SIZE: "-1"
      # Canva Connect (optional — set in the server .env; empty = feature off)
      CANVA_CLIENT_ID: ${CANVA_CLIENT_ID:-}
      CANVA_CLIENT_SECRET: ${CANVA_CLIENT_SECRET:-}
      CANVA_REDIRECT_URI: ${CANVA_REDIRECT_URI:-https://app.medianet.dz/api/canva/callback}
    depends_on:
      postgres-programme: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  # Ollama-backed scoring — optional (needs the local LLM). Enable with --profile ai-local.
  ai-scoring-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-ai-scoring-service:${TAG:-latest}
    <<: *pull
    container_name: ai-scoring-service
    profiles: ["ai-local"]
    expose: ["8084"]
    environment:
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      CANDIDATURE_SERVICE_URL: http://candidature-service:8083
      PROGRAMME_SERVICE_URL: http://programme-service:8086
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  # Ollama-backed matching — optional (needs the local LLM). Enable with --profile ai-local.
  ai-matching-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-ai-matching-service:${TAG:-latest}
    <<: *pull
    container_name: ai-matching-service
    profiles: ["ai-local"]
    expose: ["8085"]
    environment:
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      CANDIDATURE_SERVICE_URL: http://candidature-service:8083
      AUTH_SERVICE_URL: http://auth-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  admin-ai-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-admin-ai-service:${TAG:-latest}
    <<: *pull
    container_name: admin-ai-service
    expose: ["8088"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-admin-ai:5432/${POSTGRES_ADMIN_AI_DB:-admin_ai_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-medianet}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URI: http://eureka-server:8761/eureka
      HF_TOKEN: ${HF_TOKEN:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_APP_NAME: "Medianet Incubateur"
      PROGRAMME_SERVICE_URL: http://programme-service:8086
      AUTH_SERVICE_URL: http://auth-service:8081
      CANDIDATURE_SERVICE_URL: http://candidature-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      PITCH_MEDIA_SERVICE_URL: http://pitch-media-service:8087
    depends_on:
      postgres-admin-ai: { condition: service_healthy }
      eureka-server: { condition: service_healthy }
    networks: [medianet-network]

  # Video transcription (Python/ffmpeg/whisper) — OPTIONAL & heavy (~1.5 GB).
  # Off by default to fit small disks. Enable with --profile media once you have room.
  pitch-media-service:
    image: ${DOCKER_USERNAME:-yassinecherni9}/medianet-pitch-media-service:${TAG:-latest}
    <<: *pull
    container_name: pitch-media-service
    profiles: ["media"]
    expose: ["8087"]
    environment:
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://app.medianet.dz}
      MINIO_INTERNAL_URL: http://minio:9000
      OLLAMA_URL: http://ollama:11434
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE: int8
      VISION_MODEL: ${PITCH_VISION_MODEL:-moondream}
      FRAME_COUNT: "3"
      WHISPER_BEAM: "1"
    volumes:
      - whisper_models:/models
    networks: [medianet-network]

  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-medianet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
    volumes: [postgres_auth_data:/var/lib/postgresql/data]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-medianet}\" -d ${POSTGRES_AUTH_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres-candidature:
    image: postgres:15
    container_name: postgres-candidature
    environment:
      POSTGRES_DB: ${POSTGRES_CANDIDATURE_DB:-candidature_db}
      POSTGRES_USER: ${POSTGRES_USER:-medianet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
    volumes: [postgres_candidature_data:/var/lib/postgresql/data]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-medianet}\" -d ${POSTGRES_CANDIDATURE_DB:-candidature_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres-notification:
    image: postgres:15
    container_name: postgres-notification
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB:-notification_db}
      POSTGRES_USER: ${POSTGRES_USER:-medianet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
    volumes: [postgres_notification_data:/var/lib/postgresql/data]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-medianet}\" -d ${POSTGRES_NOTIFICATION_DB:-notification_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres-programme:
    image: postgres:15
    container_name: postgres-programme
    environment:
      POSTGRES_DB: ${POSTGRES_PROGRAMME_DB:-programme_db}
      POSTGRES_USER: ${POSTGRES_USER:-medianet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
    volumes: [postgres_programme_data:/var/lib/postgresql/data]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-medianet}\" -d ${POSTGRES_PROGRAMME_DB:-programme_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  postgres-admin-ai:
    image: postgres:15
    container_name: postgres-admin-ai
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_AI_DB:-admin_ai_db}
      POSTGRES_USER: ${POSTGRES_USER:-medianet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medianet2024}
    volumes: [postgres_admin_ai_data:/var/lib/postgresql/data]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-medianet}\" -d ${POSTGRES_ADMIN_AI_DB:-admin_ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  minio:
    image: minio/minio:latest
    container_name: medianet-minio
    ports:
      - "9000:9000"          # S3 API — uploaded images load from http://SERVER_IP:9000
      - "9001:9001"          # MinIO web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medianet}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-medianet2024}
    volumes: [minio_data:/data]
    command: server /data --console-address ":9001"
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: medianet-minio-setup
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
        until (mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-medianet} ${MINIO_ROOT_PASSWORD:-medianet2024}) do echo 'waiting for minio…'; sleep 2; done;
        mc mb -p local/${MINIO_BUCKET:-medianet} || true;
        mc anonymous set download local/${MINIO_BUCKET:-medianet} || true;
        echo '✓ MinIO bucket ready (public read)';
        exit 0;
      "
    networks: [medianet-network]
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medianet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-medianet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-medianet2024}
    expose: ["5672", "15672"]
    networks: [medianet-network]
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # Local LLM — OPTIONAL and heavy (multi-GB CUDA image + models; needs an NVIDIA
  # GPU to be usable). Disabled by default. Enable only on a GPU host with:
  #   docker compose -f docker-compose.prod.yml --profile ai-local up -d
  # (and remove the deploy.resources GPU block below on a CPU-only host).
  ollama:
    image: ollama/ollama
    container_name: ollama
    profiles: ["ai-local"]
    expose: ["11434"]
    volumes: [ollama_data:/root/.ollama]
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    networks: [medianet-network]
    restart: unless-stopped
    # GPU passthrough — requires the NVIDIA Container Toolkit on the host.
    # Remove this deploy block on a CPU-only server.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        OLLAMA_PID=$$!;
        until ollama list > /dev/null 2>&1; do sleep 2; done;
        ollama pull ${OLLAMA_MODEL:-llama3.2};
        wait $$OLLAMA_PID
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q ${OLLAMA_MODEL:-llama3.2}"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  medianet-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_candidature_data:
  postgres_notification_data:
  postgres_programme_data:
  postgres_admin_ai_data:
  ollama_data:
  minio_data:
  whisper_models:
  nginx_logs:
